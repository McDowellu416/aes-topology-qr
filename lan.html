<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LAN</title>

<style>
body {
    font-family: Arial;
    background: #020617;
    color: white;
    text-align: center;
    padding: 15px;
}

.card {
    max-width: 450px;
    margin: auto;
    background: #0f172a;
    border-radius: 15px;
    padding: 20px;
}

.viewer {
    position: relative;
}

.viewer img {
    width: 100%;
    border-radius: 10px;
}

/* 🔴 CLICK POINTS */
.hotspot {
    position: absolute;
    width: 30px;
    height: 30px;
    background: red;
    border-radius: 50%;
    border: 2px solid white;
}

/* adjust positions */
.server { top: 50%; right: 5%; }
.switch { top: 40%; left: 45%; }
.desktop { top: 75%; left: 40%; }

h1 { color: #38bdf8; }

.section {
    text-align: left;
    margin-top: 15px;
}

button {
    width: 100%;
    background: #22c55e;
    border: none;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    font-weight: bold;
}

.hidden {
    display: none;
}
</style>

<script>
function toggle(id) {
    let el = document.getElementById(id);
    el.classList.toggle("hidden");
}

function popup(text) {
    alert(text);
}
</script>

</head>

<body>

<div class="card">

<h1>LAN</h1>

<div class="viewer">

    <img src="lan.png">

    <!-- HOTSPOTS -->
    <div class="hotspot server"
         onclick="popup('Server stores and manages network data')"></div>

    <div class="hotspot switch"
         onclick="popup('Switch connects all devices in the LAN')"></div>

    <div class="hotspot desktop"
         onclick="popup('End-user device accessing the network')"></div>

</div>

<p><strong>Description:</strong><br>
A Local Area Network connects devices within a limited area such as a building or military site.
</p>

<button onclick="toggle('benefits')">Show Benefits</button>
<div id="benefits" class="section hidden">
<ul>
<li>High speed</li>
<li>Low latency</li>
<li>Secure</li>
</ul>
</div>

<button onclick="toggle('drawbacks')">Show Drawbacks</button>
<div id="drawbacks" class="section hidden">
<ul>
<li>Limited range</li>
<li>Needs infrastructure</li>
</ul>
</div>

</div>

</body>
</html>
